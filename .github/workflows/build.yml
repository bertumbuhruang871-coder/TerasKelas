name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Ekstrak File ZIP
        run: |
          unzip TerasKelasKu-App.zip -d ./
          
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Cordova
        run: |
          npm install -g cordova

      - name: Create Cordova Project & Build APK
        run: |
          cordova create myApp com.teras.kelas TerasKelas
          cd myApp
          cordova platform add android
          rm -rf www/*
          cp -r ../* www/ 2>/dev/null || true
          cordova build android --novr

      - name: Upload APK Result
        uses: actions/upload-artifact@v3
        with:
          name: TerasKelas-APK
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
