name: Build PWA to Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ekstrak ZIP
        run: |
          mkdir -p web_files
          unzip -o TerasKelasKu-App.zip -d ./web_files

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap & Build APK
        run: |
          npm install -g @bubblewrap/cli
          # Inisialisasi & Generate APK dari PWA
          cd web_files
          npx @bubblewrap/cli init --manifest=manifest.json || true
          npx @bubblewrap/cli build || true

      - name: Simpan File APK
        uses: actions/upload-artifact@v4
        with:
          name: TerasKelas-PWA-APK
          path: web_files/*.apk
          
