name: Build Simple Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Ekstrak Semua File ZIP
        run: |
          mkdir -p www_folder
          find . -maxdepth 2 -name "*.zip" -exec unzip -o {} -d ./www_folder \; || true
          # Jika tidak ada zip, salin file biasa
          cp -r *.html *.js *.css www_folder/ 2>/dev/null || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          npm install -g cordova
          cordova create myapp com.teras.kelas TerasKelas
          cd myapp
          cordova platform add android
          rm -rf www/*
          cp -r ../www_folder/* www/ 2>/dev/null || true
          cordova build android --novr

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: TerasKelas-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
